<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <title>GELOS.io</title>
  <link href="styles.css" rel="stylesheet" />
  <script src="https://cdn.plot.ly/plotly-2.18.1.min.js"></script>
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.13.0/mapbox-gl.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.13.0/mapbox-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
  <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-draw/v1.5.0/mapbox-gl-draw.js"></script>
  <script type="text/javascript"  src="https://cdn.jsdelivr.net/npm/mapbox-pmtiles@1/dist/mapbox-pmtiles.umd.min.js"></script>
  <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-draw/v1.5.0/mapbox-gl-draw.css" type="text/css">
</head>
<body>
  <div id="header">
     <div id="left-header">
         <a href="https://www.clarku.edu/centers/geospatial-analytics/"><img id="logo" src="data/cga-logo.png" alt="CGA logo" /></a>
        <div id="header-text"><b>Geospatial Exploration of Latent Observation Space (GELOS)</b></div>
     </div>
    <div id="right-header">
      <a href="">About</a>
      <a href="https://github.com/ClarkCGA/gelos-app">Github</a>
    </div>
  </div>
  <div id="container">
    <div id="map-wrap">
      <div class="navbar">    
        <div class="dropdown">
          <button id="models-btn" class="dropbtn" onclick="toggleMenu(this)">Models
            <i class="fa fa-caret-down"></i>
          </button>
          <div class="dropdown-content" id="model-menu">
            <a href="#" gfm="prithvi-eo-2.0">Prithvi-EO-2.0</a>
            <a href="#" gfm="model 2">Model 2</a>
            <a href="#" gfm="model 3">Model 3</a>
          </div>
        </div>

        <div class="dropdown">
          <button id="images-btn" class="dropbtn" onclick="toggleMenu(this)">Images
            <i class="fa fa-caret-down"></i>
          </button>
          <div class="dropdown-content" id="image-menu">
            <a href="#" thumb-dataset="sentinel_1">Sentinel-1</a>
            <a href="#" thumb-dataset="sentinel_2">Sentinel-2</a>
            <a href="#" thumb-dataset="landsat">Landsat</a>
          </div>
        </div>
      </div>

      <div class="globe-map">
        <button type="button" onclick="clickFunction('globe', this)">Globe</button>
        <button type="button" onclick="clickFunction('mercator', this)">Map</button>
      </div>

      <div id="map-plot"></div>
    </div>
      
    <div id="right-container">
      <div id="scatter-plot"></div>
      <div id="image-container"></div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
