name: Gelos App Deployment
on:
  push:  
    branches: [dev]
  workflow_dispatch: 

permissions:
  contents: read 
  pages: write 
  id-token: write 

concurrency:
  group: "pages"
  cancel-in-progress: true

# the workflow's jobs
jobs:
  build:
    runs-on: ubuntu-latest 
    steps:
      - name: Checkout  
        uses: actions/checkout@v4 
      
      # configure the Pages deployment environment
      - name: Configure Pages 
        uses: actions/configure-pages@v5
      - name: Prepare dist 
        shell: bash
        run: |
          set -euo pipefail  # fail on errors
          rm -rf dist
          mkdir -p dist         
          # copy everything except CI/build folders
          rsync -av \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'node_modules' \
            --exclude 'dist' \
            ./ dist/

      # Create env.js from repo secret
      - name: Write env.js from secret
        run: |
          echo "window.MAPBOX_APIKey = '${{ secrets.MAPBOX_APIKEY }}';" > dist/env.js
          echo "window.GA_MEASUREMENT_ID = '${{ secrets.GA_MEASUREMENT_ID }}';" >> dist/env.js
      
      - name: Add .nojekyll
        run: touch dist/.nojekyll
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build   
    runs-on: ubuntu-latest
    permissions:   
      pages: write        
      id-token: write     
    environment:   
      name: github-pages  
      url: ${{ steps.deployment.outputs.page_url }}
    steps:  
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4